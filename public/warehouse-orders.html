<!DOCTYPE html>
<html lang="uz">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Zakazlar ro'yxati</title>
  <link rel="icon" type="image/svg+xml" href="/favicon.svg">
  <style>
    :root {
      --bg: #f6efe7;
      --panel: #fffdf9;
      --ink: #18130f;
      --muted: #6f6559;
      --accent: #7e4d20;
      --accent-2: #244b49;
      --line: #e3d6c7;
      --ok: #24613b;
      --error: #9f1239;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: Georgia, "Times New Roman", serif;
      color: var(--ink);
      background:
        radial-gradient(circle at top left, rgba(126, 77, 32, 0.12), transparent 28%),
        radial-gradient(circle at right center, rgba(36, 75, 73, 0.11), transparent 30%),
        linear-gradient(180deg, #fffaf4 0%, var(--bg) 100%);
      min-height: 100vh;
    }

    body,
    input,
    textarea,
    button,
    .button-link,
    .order-card,
    .order-meta {
      font-variant-numeric: lining-nums tabular-nums;
      font-feature-settings: "lnum" 1, "tnum" 1;
    }

    strong,
    .order-card strong {
      font-family: "Segoe UI", Tahoma, sans-serif;
      font-weight: 700;
    }
    .shell {
      width: min(1220px, calc(100% - 28px));
      margin: 0 auto;
      padding: 28px 0 44px;
    }
    .hero {
      display: flex;
      justify-content: space-between;
      gap: 16px;
      align-items: end;
      flex-wrap: wrap;
      margin-bottom: 22px;
    }
    .eyebrow {
      font-size: 12px;
      letter-spacing: 0.16em;
      text-transform: uppercase;
      color: var(--muted);
      margin-bottom: 8px;
    }
    h1 { margin: 0; font-size: clamp(30px, 5vw, 58px); line-height: 0.95; }
    .links { display: flex; gap: 10px; flex-wrap: wrap; }
    .button-link, button {
      border: 0; border-radius: 999px; padding: 12px 18px; font: inherit; cursor: pointer;
      text-decoration: none; background: var(--accent); color: #fff;
    }
    .button-link.secondary, button.secondary { background: #eadfce; color: var(--ink); }
    .layout { display: grid; grid-template-columns: 340px 1fr; gap: 20px; align-items: start; }
    .card {
      background: color-mix(in srgb, var(--panel) 95%, white 5%);
      border: 1px solid var(--line); border-radius: 22px; box-shadow: 0 18px 36px rgba(53, 34, 15, 0.06);
      padding: 18px;
    }
    label, input, textarea { display: block; width: 100%; font: inherit; }
    input, textarea {
      border-radius: 12px; border: 1px solid var(--line); background: #fff; padding: 12px 14px; margin: 8px 0 14px;
    }
    textarea { min-height: 110px; resize: vertical; }
    .status { min-height: 24px; color: var(--ok); margin-top: 10px; }
    .status.error { color: var(--error); }
    .muted { color: var(--muted); font-size: 14px; }
    .hidden { display: none !important; }
    .order-list { display: grid; gap: 14px; }
    .order-card {
      border: 1px solid var(--line);
      border-radius: 18px;
      background: rgba(255,255,255,0.92);
      padding: 16px;
    }
    .order-card strong { display: block; font-size: 22px; margin-bottom: 6px; }
    .order-meta { display: flex; flex-wrap: wrap; gap: 12px; margin: 8px 0; color: var(--muted); font-size: 14px; }
    .order-note { white-space: pre-wrap; line-height: 1.5; }
    @media (max-width: 960px) { .layout { grid-template-columns: 1fr; } }
  </style>
</head>
<body>
  <div class="shell">
    <section class="hero">
      <div>
        <div class="eyebrow">Zakazlar</div>
        <h1>Zakazlar ro'yxati</h1>
      </div>
    </section>

    <section class="layout">
      <aside class="card">
        <div id="authPanel">
          <h2 id="authTitle">Xodim yoki admin kirishi</h2>
          <div id="usernameGroup">
            <label for="username">Username</label>
            <input id="username" autocomplete="username" placeholder="123456">
          </div>
          <div id="passwordGroup">
            <label for="password">Password</label>
            <input id="password" type="password" autocomplete="current-password" placeholder="19750104">
          </div>
          <div id="pinGroup">
            <label for="pinCode">PIN kod</label>
            <input id="pinCode" inputmode="numeric" maxlength="6" placeholder="4-6 raqam">
          </div>
          <div class="links">
            <button id="save-auth">Saqlash</button>
            <button id="unlock-pin" class="secondary">PIN bilan kirish</button>
            <button id="clear-pin" class="secondary">PINni o'chirish</button>
            <button id="show-login" class="secondary hidden">Login bilan kirish</button>
            <button id="reload" class="secondary">Yangilash</button>
          </div>
          <div id="authHint" class="muted" style="margin-top: 8px;">Birinchi marta username/password bilan kiring. PIN yozib saqlasangiz, keyingi safar shu PIN yetadi.</div>
        </div>
        <div id="activeSessionNotice" class="muted hidden"></div>

        <div style="margin-top: 18px;">
          <h2 style="margin: 0 0 10px; font-size: 24px;">Yangi zakaz yozish</h2>
          <label for="orderCustomerName">Mijoz nomi</label>
          <input id="orderCustomerName" list="orderCustomerNameOptions" placeholder="Masalan: Ali aka">
          <datalist id="orderCustomerNameOptions"></datalist>
          <div id="orderCustomerHint" class="muted" style="margin-top: -6px; margin-bottom: 12px;">Mijozlar mundarijasidagi ismni tanlash yoki yangi nom yozish mumkin.</div>
          <label for="orderOrganizationName">Tashkilot nomi</label>
          <input id="orderOrganizationName" placeholder="Masalan: AKBEL SAVDO MCHJ">
          <label for="orderTaxId">INN</label>
          <input id="orderTaxId" placeholder="123456789">
          <label for="orderPhone">Telefon</label>
          <input id="orderPhone" placeholder="+99890...">
          <label for="orderNote">Zakaz</label>
          <textarea id="orderNote" placeholder="Masalan: Ertaga 5 blok naqd сыр kerak"></textarea>
          <button id="save-order">Zakazni saqlash</button>
        </div>

        <div id="status" class="status"></div>
      </aside>

      <main class="card">
        <h2 style="margin-top: 0;">Yozilgan zakazlar</h2>
        <div id="orderSummary" class="muted">Zakazlar yuklanmoqda...</div>
        <div id="orderList" class="order-list" style="margin-top: 14px;"></div>
      </main>
    </section>
  </div>

  <script src="/warehouse/assets/warehouse-auth-pin.js"></script>
  <script>
    const usernameGroupEl = document.getElementById('usernameGroup');
    const usernameEl = document.getElementById('username');
    const passwordEl = document.getElementById('password');
    const pinEl = document.getElementById('pinCode');
    const authPanelEl = document.getElementById('authPanel');
    const activeSessionNoticeEl = document.getElementById('activeSessionNotice');
    const authTitleEl = document.getElementById('authTitle');
    const passwordGroupEl = document.getElementById('passwordGroup');
    const saveAuthButtonEl = document.getElementById('save-auth');
    const unlockPinButtonEl = document.getElementById('unlock-pin');
    const clearPinButtonEl = document.getElementById('clear-pin');
    const showLoginButtonEl = document.getElementById('show-login');
    const authHintEl = document.getElementById('authHint');
    const statusEl = document.getElementById('status');
    const orderSummaryEl = document.getElementById('orderSummary');
    const orderListEl = document.getElementById('orderList');
    const orderCustomerNameEl = document.getElementById('orderCustomerName');
    const orderCustomerNameOptionsEl = document.getElementById('orderCustomerNameOptions');
    const orderCustomerHintEl = document.getElementById('orderCustomerHint');
    const orderOrganizationNameEl = document.getElementById('orderOrganizationName');
    const orderTaxIdEl = document.getElementById('orderTaxId');
    const orderPhoneEl = document.getElementById('orderPhone');
    let accessToken = (window.getWarehouseSearchParam ? window.getWarehouseSearchParam('access', location.search) : '') || localStorage.getItem('warehouse-access-token') || '';
    let orderCustomerDirectoryState = [];
    if (accessToken) {
      localStorage.setItem('warehouse-access-token', accessToken);
    }

    function setStatus(message, isError = false) {
      statusEl.textContent = message || '';
      statusEl.classList.toggle('error', Boolean(isError));
    }

    function authHeader() {
      if (accessToken) return null;
      const username = usernameEl.value.trim();
      const password = passwordEl.value;
      if (!username || !password) throw new Error('Xodim yoki admin login va parolini kiriting.');
      localStorage.setItem('warehouse-staff-username', username);
      pinAuth.syncPasswordStorage(password, 'warehouse-staff-password');
      return 'Basic ' + btoa(username + ':' + password);
    }

    async function apiFetch(url, options = {}) {
      const normalizedUrl = typeof url === 'string' && url.startsWith('/api/warehouse')
        ? `/warehouse/api${url.slice('/api'.length)}`
        : url;
      const authValue = authHeader();
      const requestHeaders = Object.assign(
        {},
        options.headers || {},
        authValue ? { Authorization: authValue } : {},
        accessToken ? { 'X-Warehouse-Access': accessToken } : {}
      );
      const response = await fetch(normalizedUrl, {
        ...options,
        headers: requestHeaders,
      });
      const data = await response.json().catch(() => ({}));
      if (!response.ok) throw new Error(data.error || 'So\'rov bajarilmadi');
      return data;
    }

    function formatDateTime(value) {
      const date = new Date(value || '');
      if (Number.isNaN(date.getTime())) {
        return '-';
      }
      return new Intl.DateTimeFormat('ru-RU', {
        day: '2-digit',
        month: '2-digit',
        year: 'numeric',
        hour: '2-digit',
        minute: '2-digit',
      }).format(date);
    }

    function escapeHtml(value) {
      return String(value || '')
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;')
        .replace(/"/g, '&quot;');
    }

    function uniqueCustomerNames(customer) {
      const names = customer && Array.isArray(customer.fullNames) && customer.fullNames.length
        ? customer.fullNames
        : [customer && customer.fullName ? customer.fullName : ''];
      const uniqueNames = [];
      names.map((entry) => String(entry || '').trim()).filter(Boolean).forEach((entry) => {
        if (uniqueNames.indexOf(entry) === -1) {
          uniqueNames.push(entry);
        }
      });
      return uniqueNames;
    }

    function renderOrderCustomerDirectory(customers) {
      const safeCustomers = Array.isArray(customers) ? customers : [];
      const options = [];
      for (const customer of safeCustomers) {
        const extra = [customer.organizationName, customer.taxId ? `INN ${customer.taxId}` : null]
          .filter(Boolean)
          .join(' · ');
        for (const name of uniqueCustomerNames(customer)) {
          options.push(`<option value="${escapeHtml(name)}" label="${escapeHtml(extra)}"></option>`);
        }
      }
      orderCustomerNameOptionsEl.innerHTML = options.join('');
      orderCustomerHintEl.textContent = safeCustomers.length
        ? `Ro'yxatda ${safeCustomers.length} ta mijoz bor. Ismini yozsangiz, mavjudlari chiqadi.`
        : "Mijozlar mundarijasidan tanlash uchun ro'yxat bo'sh.";
    }

    function findCustomerByName(name) {
      const normalizedName = String(name || '').trim().toLocaleLowerCase('ru');
      if (!normalizedName) {
        return null;
      }
      return orderCustomerDirectoryState.find((customer) => uniqueCustomerNames(customer).some((entry) => entry.toLocaleLowerCase('ru') === normalizedName)) || null;
    }

    function syncOrderCustomerFields() {
      const customer = findCustomerByName(orderCustomerNameEl.value);
      if (!customer) {
        return;
      }
      if (!orderOrganizationNameEl.value.trim() && customer.organizationName) {
        orderOrganizationNameEl.value = customer.organizationName;
      }
      if (!orderTaxIdEl.value.trim() && customer.taxId) {
        orderTaxIdEl.value = customer.taxId;
      }
      if (!orderPhoneEl.value.trim()) {
        const firstPhone = Array.isArray(customer.phones) ? customer.phones.find(Boolean) : null;
        if (firstPhone) {
          orderPhoneEl.value = firstPhone;
        }
      }
    }

    async function loadOrderCustomerDirectory() {
      const data = await apiFetch('/api/warehouse/order-customer-directory');
      orderCustomerDirectoryState = Array.isArray(data.customers) ? data.customers : [];
      renderOrderCustomerDirectory(orderCustomerDirectoryState);
    }

    function renderOrders(orders) {
      const safeOrders = Array.isArray(orders) ? orders : [];
      orderSummaryEl.textContent = safeOrders.length
        ? `Jami ${safeOrders.length} ta zakaz yozilgan.`
        : 'Hozircha zakaz yozilmagan.';
      if (!safeOrders.length) {
        orderListEl.innerHTML = '<p>Zakazlar hali yo\'q.</p>';
        return;
      }
      orderListEl.innerHTML = safeOrders.map((order) => `
        <article class="order-card">
          <strong>${order.customerName || order.organizationName || (order.taxId ? `INN: ${order.taxId}` : 'Zakaz')}</strong>
          <div class="order-meta">
            <span>Tashkilot: ${order.organizationName || '-'}</span>
            <span>INN: ${order.taxId || '-'}</span>
            <span>Telefon: ${order.phone || '-'}</span>
            <span>Yozgan: ${order.operatorFullName || order.operatorUsername || 'Noma\'lum'}</span>
            <span>Vaqti: ${formatDateTime(order.createdAt)}</span>
          </div>
          <div class="order-note">${order.note}</div>
        </article>
      `).join('');
    }

    async function loadOrders() {
      setStatus('Zakazlar yuklanmoqda...');
      const [orderData] = await Promise.all([
        apiFetch('/api/warehouse/orders'),
        loadOrderCustomerDirectory(),
      ]);
      if (window.setWarehouseOperatorProfile) {
        window.setWarehouseOperatorProfile(orderData.operator || null);
      }
      renderOrders(orderData.orders || []);
      setStatus('Tayyor.');
    }

    const pinAuth = window.createWarehousePinAuth({
      usernameEl,
      passwordEl,
      pinEl,
      setStatus,
      sessionKey: 'warehouse-browser-session',
      initialUsername: localStorage.getItem('warehouse-staff-username') || localStorage.getItem('warehouse-seller-username') || localStorage.getItem('warehouse-accountant-username') || localStorage.getItem('warehouse-admin-username') || '',
      initialPassword: localStorage.getItem('warehouse-staff-password') || localStorage.getItem('warehouse-seller-password') || localStorage.getItem('warehouse-accountant-password') || localStorage.getItem('warehouse-admin-password') || '',
      lockedMessage: 'PIN saqlangan. PIN bilan kiring yoki username/passwordni qayta yozing.',
      credentialsMessage: 'Xodim yoki admin login va parolini kiriting.',
    });

    const authUi = window.createWarehouseAuthUi({
      pinAuth,
      accessToken,
      authPanelEl,
      sessionNoticeEl: activeSessionNoticeEl,
      titleEl: authTitleEl,
      passwordGroupEl,
      saveAuthButtonEl,
      unlockPinButtonEl,
      clearPinButtonEl,
      showLoginButtonEl,
      hintEl: authHintEl,
      fullTitle: 'Xodim yoki admin kirishi',
      pinTitle: 'PIN bilan kirish',
      fullHint: 'Birinchi marta username/password bilan kiring. PIN yozib saqlasangiz, keyingi safar shu PIN yetadi.',
      pinHint: 'Qayta kirishda username va PIN kodni kiriting.',
      activeHint: 'Kirish tasdiqlandi. Shu tab ichida qayta login so\'ralmaydi.',
    });

    const staffPicker = window.createWarehouseStaffSelector({
      usernameEl,
      usernameGroupEl,
      label: "Xodimlar ro'yxati",
      manualOptionLabel: 'Admin yoki boshqa login',
    });

    document.getElementById('save-auth').addEventListener('click', async () => {
      try {
        await pinAuth.rememberFromCredentials();
        authHeader();
        await loadOrders();
        authUi.markAuthenticated({ username: usernameEl.value.trim(), password: passwordEl.value });
      } catch (error) {
        setStatus(error.message, true);
      }
    });

    document.getElementById('unlock-pin').addEventListener('click', async () => {
      try {
        const credentials = await pinAuth.unlockWithPin();
        await loadOrders();
        authUi.markAuthenticated(credentials);
      } catch (error) {
        setStatus(error.message, true);
      }
    });

    document.getElementById('clear-pin').addEventListener('click', () => {
      try {
        pinAuth.clearPin();
        authUi.render();
      } catch (error) {
        setStatus(error.message, true);
      }
    });

    showLoginButtonEl.addEventListener('click', () => {
      authUi.showFullLogin();
      staffPicker.showManualLogin();
      setStatus('Boshqa login bilan kirish ochildi.');
    });

    document.getElementById('reload').addEventListener('click', async () => {
      try {
        await loadOrders();
      } catch (error) {
        setStatus(error.message, true);
      }
    });

    orderCustomerNameEl.addEventListener('change', syncOrderCustomerFields);
    orderCustomerNameEl.addEventListener('input', syncOrderCustomerFields);

    document.getElementById('save-order').addEventListener('click', async () => {
      try {
        const customerName = orderCustomerNameEl.value.trim();
        const organizationName = orderOrganizationNameEl.value.trim();
        const taxId = orderTaxIdEl.value.trim();
        const phone = orderPhoneEl.value.trim();
        const note = document.getElementById('orderNote').value.trim();
        await apiFetch('/api/warehouse/orders', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ customerName, organizationName, taxId, phone, note }),
        });
        orderCustomerNameEl.value = '';
        orderOrganizationNameEl.value = '';
        orderTaxIdEl.value = '';
        orderPhoneEl.value = '';
        document.getElementById('orderNote').value = '';
        setStatus('Zakaz saqlandi.');
        await loadOrders();
      } catch (error) {
        setStatus(error.message, true);
      }
    });

    authUi.render();
    staffPicker.load().catch(() => {});
    if (accessToken || pinAuth.hasActiveSession() || (usernameEl.value && passwordEl.value)) {
      loadOrders().catch((error) => setStatus(error.message, true));
    } else if (pinAuth.hasPin()) {
      setStatus('PIN saqlangan. PIN bilan kiring, keyin zakazlar yuklanadi.');
    } else {
      setStatus('Xodim, admin yoki link orqali kiring, keyin zakazlar yuklanadi.');
    }
  </script>
  <script src="/warehouse-top-nav.js"></script>
</body>
</html>
